# ============================================
# Maverick Bank - Application Configuration
# ============================================

spring.application.name=maverick-bank

# ---- Server ----
server.port=8080

# ---- Database (AWS RDS MySQL) ----
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/maverick_bank?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- JWT Security ----
app.jwt.secret=${JWT_SECRET:MaverickBankSecretKey2024MaverickBankSecretKey2024MaverickBankSecretKey2024}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

# ---- CORS ----
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://your-frontend-domain.com}

# ---- Mail (AWS SES) ----
# spring.mail.host=${MAIL_HOST:email-smtp.us-east-1.amazonaws.com}
# spring.mail.port=587
# spring.mail.username=${MAIL_USERNAME:}
# spring.mail.password=${MAIL_PASSWORD:}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# app.mail.from=${MAIL_FROM:noreply@maverickbank.com}

# ---- Logging ----
logging.level.com.maverickbank=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_PATH:/var/log/maverick-bank}/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ---- SpringDoc / Swagger ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ---- API Versioning ----
api.version=v1
