services:
  # MySQL Database (Private Service)
  - type: pvt
    name: maverick-db
    env: image
    image: mysql:8.0
    plan: free
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: Siva@12345
      - key: MYSQL_DATABASE
        value: maverick_bank
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # Spring Boot Backend
  - type: web
    name: maverick-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        value: jdbc:mysql://maverick-db:3306/maverick_bank?useSSL=false
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: Siva@12345
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://maverick-bank-frontend.vercel.app # Update this after Vercel deployment
